[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src", "."]
addopts = "-q"
filterwarnings = ["ignore::DeprecationWarning"]

[tool.ruff]
line-length = 100
target-version = "py311"
src = ["src", "harness", "training", "tools"]

[tool.ruff.lint]
select = ["E", "F", "I", "B"]
ignore = ["E501"]
